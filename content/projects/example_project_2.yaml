title: "Project Sports prediction"

short_summary: >
  The project I did for 

tech_stack:
  - Pandas
  - Pathlib
  - Python
  - re
  - numpy
  - matplotlib
  - sklearn 

problem_statement: >
  The problem was to find which model was more accurate at predicting the outcomes of the march madness tournament. 

approach: >
  I used data sets that were publicaly avalible of previous march madness tournaments and I used those previous results to 
  create a new data frame of what I felt was the most important features to predict the outcomes of the tournament. I then used that data frame to train different machine learning models 
  and then I compared the results of those models to see which one was more accurate at predicting the outcomes of the tournament.

results_impact: >
  I recorded the frequency of how many times each model predicted how many times each team would go to each round of the tournament and then 
  I compared those frequencies to the actual outcomes of the tournament to see which model was more accurate.


